<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notas - Sistema Educativo</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2c7be5, #00c6ff);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      background: white;
      color: black;
      width: 90%;
      max-width: 800px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    input {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #1a5fd0;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #2c7be5;
      color: white;
    }

    .acciones button {
      background: red;
    }

    .acciones button:hover {
      background: darkred;
    }

    #mensaje {
      font-weight: bold;
      margin-top: 10px;
      color: red;
    }

    .top-actions {
      text-align: center;
    }

    .nav-buttons {
      text-align: center;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<div class="header">
  📊 Gestión de Notas
</div>

<div class="container">

  <!-- BUSCADOR -->
  <div class="top-actions">
    <input type="text" id="buscador" placeholder="Buscar materia..." onkeyup="filtrarTabla()">
  </div>

  <!-- FORMULARIO -->
  <h3>Agregar Nota</h3>
  <input id="materia" placeholder="Materia">
  <input id="nota" type="number" placeholder="Nota (0-5)">
  <button id="btnAgregar" onclick="agregarNota()">Agregar</button>

  <p id="mensaje"></p>

  <!-- TABLA -->
  <table id="tablaNotas">
    <thead>
      <tr>
        <th>Materia</th>
        <th>Nota</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="cuerpoTabla">
      <tr>
        <td>Matemáticas</td>
        <td>4.5</td>
        <td class="acciones">
          <button onclick="eliminarFila(this)">Eliminar</button>
        </td>
      </tr>
      <tr>
        <td>Programación</td>
        <td>4.8</td>
        <td class="acciones">
          <button onclick="eliminarFila(this)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- PROMEDIO -->
  <h3 id="promedio">Promedio: 0</h3>
  <button id="btnPromedio" onclick="calcularPromedio()">Calcular Promedio</button>

  <!-- NAVEGACIÓN -->
  <div class="nav-buttons">
    <button id="btnVolver" onclick="window.location.href='dashboard.html'">Volver</button>
    <button id="btnLogout" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<script>

function agregarNota() {
  let materia = document.getElementById("materia").value;
  let nota = document.getElementById("nota").value;

  if (materia === "" || nota === "") {
    document.getElementById("mensaje").innerText = "Campos obligatorios";
    return;
  }

  if (nota < 0 || nota > 5) {
    document.getElementById("mensaje").innerText = "Nota inválida (0-5)";
    return;
  }

  let tabla = document.getElementById("cuerpoTabla");
  let fila = tabla.insertRow();

  fila.insertCell(0).innerText = materia;
  fila.insertCell(1).innerText = nota;

  let accion = fila.insertCell(2);
  accion.innerHTML = '<button onclick="eliminarFila(this)">Eliminar</button>';

  document.getElementById("mensaje").innerText = "Nota agregada correctamente";
}

function eliminarFila(btn) {
  btn.parentNode.parentNode.remove();
}

function calcularPromedio() {
  let filas = document.querySelectorAll("#cuerpoTabla tr");
  let suma = 0;

  filas.forEach(f => {
    suma += parseFloat(f.cells[1].innerText);
  });

  let promedio = (suma / filas.length).toFixed(2);
  document.getElementById("promedio").innerText = "Promedio: " + promedio;
}

function filtrarTabla() {
  let filtro = document.getElementById("buscador").value.toLowerCase();
  let filas = document.querySelectorAll("#cuerpoTabla tr");

  filas.forEach(f => {
    let materia = f.cells[0].innerText.toLowerCase();
    f.style.display = materia.includes(filtro) ? "" : "none";
  });
}

function logout() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
