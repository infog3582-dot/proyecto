<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Educativo</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2c7be5, #00c6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: white;
      color: black;
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 20px;
      color: gray;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #2c7be5;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 25px;
      background: #2c7be5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1a5fd0;
      transform: scale(1.03);
    }

    #mensaje {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }

    .links {
      margin-top: 15px;
    }

    a {
      text-decoration: none;
      color: #2c7be5;
      font-size: 14px;
    }

    a:hover {
      text-decoration: underline;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="logo">🎓</div>

  <h2 id="tituloLogin">Sistema Educativo</h2>
  <p class="subtitle">Inicio de sesión</p>

  <input id="usuario" type="text" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button id="btnLogin" onclick="login()">Ingresar</button>

  <p id="mensaje"></p>

  <div class="links">
    <a href="registro.html" id="linkRegistro">¿No tienes cuenta? Regístrate</a><br>
    <a href="index.html" id="volverInicio">Volver al inicio</a>
  </div>

</div>

<script>
function login() {
  let u = document.getElementById("usuario").value;
  let p = document.getElementById("password").value;

  if (u === "" || p === "") {
    document.getElementById("mensaje").innerText = "Campos obligatorios";
    return;
  }

  if (u === "admin" && p === "123") {
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("mensaje").innerText = "Credenciales incorrectas";
  }
}
</script>

</body>
</html>
